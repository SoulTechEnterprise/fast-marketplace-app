name: Build and Release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Set version from tag (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          TAG=${GITHUB_REF_NAME#v}
          sed -i "s/^version = \".*\"/version = \"$TAG\"/" Cargo.toml

      - name: Set version from tag (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          TAG=${GITHUB_REF_NAME#v}
          sed -i '' "s/^version = \".*\"/version = \"$TAG\"/" Cargo.toml

      - name: Set version from tag (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME -replace '^v', ''
          (Get-Content Cargo.toml) -replace '^version = ".*"', "version = `"$tag`"" | Set-Content Cargo.toml

      - run: cargo build --release

      - if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Rename-Item -Path target/release/app.exe -NewName automatize-marketplace-windows.exe

      - if: matrix.os == 'ubuntu-latest'
        run: mv target/release/app target/release/automatize-marketplace-linux

      - if: matrix.os == 'macos-latest'
        run: mv target/release/app target/release/automatize-marketplace-macos

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/automatize-marketplace-windows.exe
            target/release/automatize-marketplace-linux
            target/release/automatize-marketplace-macos
          fail_on_unmatched_files: false
